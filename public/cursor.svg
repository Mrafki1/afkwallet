<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pixel sword cursor — tip at (0,0), pointing upper-left -->
  <!-- Blade highlight -->
  <rect x="0" y="0" width="2" height="1" fill="#f0f0f0"/>
  <rect x="0" y="1" width="1" height="1" fill="#e0e0e0"/>
  <rect x="1" y="1" width="2" height="1" fill="#d0d0d0"/>
  <rect x="1" y="2" width="1" height="1" fill="#c0c0c0"/>
  <rect x="2" y="2" width="2" height="1" fill="#b8b8b8"/>
  <rect x="2" y="3" width="1" height="1" fill="#a8a8a8"/>
  <rect x="3" y="3" width="2" height="1" fill="#a0a0a0"/>
  <!-- Blade shadow side -->
  <rect x="0" y="2" width="1" height="1" fill="#888888"/>
  <rect x="1" y="3" width="1" height="1" fill="#808080"/>
  <rect x="2" y="4" width="1" height="1" fill="#787878"/>
  <!-- Guard (gold) -->
  <rect x="3" y="4" width="5" height="2" fill="#d4a017"/>
  <rect x="5" y="2" width="2" height="2" fill="#d4a017"/>
  <rect x="5" y="4" width="1" height="1" fill="#f0c840"/>
  <rect x="4" y="5" width="1" height="1" fill="#b88010"/>
  <!-- Handle (wood brown) -->
  <rect x="6" y="6" width="2" height="1" fill="#8b5e3c"/>
  <rect x="7" y="7" width="2" height="1" fill="#7a5430"/>
  <rect x="8" y="8" width="2" height="1" fill="#8b5e3c"/>
  <!-- Pommel (gold) -->
  <rect x="9" y="8" width="3" height="3" fill="#d4a017"/>
  <rect x="10" y="9" width="1" height="1" fill="#f0c840"/>
  <!-- Dark outline -->
  <rect x="0" y="3" width="1" height="1" fill="#404040"/>
  <rect x="3" y="0" width="1" height="1" fill="#505050"/>
  <rect x="12" y="8" width="1" height="3" fill="#7a5430"/>
  <rect x="9" y="11" width="3" height="1" fill="#7a5430"/>
</svg>
