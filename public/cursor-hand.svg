<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Finger tip -->
  <rect x="5" y="0" width="2" height="1" fill="#f5e6c8"/>
  <rect x="4" y="1" width="4" height="1" fill="#f5e6c8"/>
  <rect x="4" y="2" width="4" height="1" fill="#f5e6c8"/>
  <rect x="4" y="3" width="4" height="1" fill="#f5e6c8"/>
  <!-- Knuckle join -->
  <rect x="3" y="4" width="5" height="1" fill="#f5e6c8"/>
  <!-- Other fingers joining -->
  <rect x="2" y="5" width="7" height="1" fill="#f5e6c8"/>
  <rect x="2" y="6" width="8" height="1" fill="#f5e6c8"/>
  <rect x="2" y="7" width="8" height="1" fill="#f5e6c8"/>
  <!-- Palm -->
  <rect x="2" y="8" width="8" height="1" fill="#f5e6c8"/>
  <rect x="1" y="9" width="9" height="1" fill="#f5e6c8"/>
  <rect x="1" y="10" width="9" height="1" fill="#f5e6c8"/>
  <rect x="1" y="11" width="9" height="1" fill="#f5e6c8"/>
  <rect x="2" y="12" width="8" height="1" fill="#f5e6c8"/>
  <rect x="3" y="13" width="6" height="1" fill="#f5e6c8"/>
  <!-- Outline / shadow -->
  <rect x="5" y="0" width="2" height="1" fill="#3d2b1f" opacity="0.3" transform="translate(1,1)"/>
  <!-- Dark outline -->
  <rect x="5" y="0" width="2" height="1" fill="#3d2b1f"/>
  <rect x="4" y="1" width="1" height="3" fill="#3d2b1f"/>
  <rect x="8" y="1" width="1" height="3" fill="#3d2b1f"/>
  <rect x="3" y="4" width="1" height="1" fill="#3d2b1f"/>
  <rect x="9" y="4" width="1" height="1" fill="#3d2b1f"/>
  <rect x="2" y="5" width="1" height="3" fill="#3d2b1f"/>
  <rect x="10" y="5" width="1" height="3" fill="#3d2b1f"/>
  <rect x="1" y="8" width="1" height="4" fill="#3d2b1f"/>
  <rect x="10" y="8" width="1" height="4" fill="#3d2b1f"/>
  <rect x="2" y="12" width="1" height="1" fill="#3d2b1f"/>
  <rect x="9" y="12" width="1" height="1" fill="#3d2b1f"/>
  <rect x="3" y="13" width="6" height="1" fill="#3d2b1f"/>
</svg>
